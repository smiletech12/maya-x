<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAYA-XMD | Pair Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: #050a15;
      background-image: url('https://images.unsplash.com/photo-1446776877081-d282a0f896e2?w=1920&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Exo 2', sans-serif;
      color: #e5f5f1;
      overflow-x: hidden;
    }

    .bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(5, 10, 21, 0.78);
      z-index: 0;
    }

    .particle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .glowing-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .glow-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      animation: float 22s infinite ease-in-out;
    }

    .glow-circle:nth-child(1) {
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(0, 255, 170, 0.5) 0%, transparent 70%);
      top: -10%; left: -8%;
      animation-duration: 25s;
    }

    .glow-circle:nth-child(2) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0, 100, 255, 0.4) 0%, transparent 70%);
      bottom: -8%; right: -5%;
      animation-duration: 30s; animation-delay: 5s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, 50px) scale(1.08); }
      66% { transform: translate(-30px, 30px) scale(0.95); }
    }

    .scan-lines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 255, 170, 0.012) 2px,
        rgba(0, 255, 170, 0.012) 4px
      );
      z-index: 1;
      pointer-events: none;
    }

    .page-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
      gap: 1.5rem;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: rgba(10, 25, 47, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 50px;
      color: #00ffaa;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(0, 255, 170, 0.1);
      border-color: rgba(0, 255, 170, 0.5);
      transform: translateX(-3px);
    }

    .pair-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: 2rem;
      gap: 0.5rem;
    }

    .pair-logo {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(#050a15, #050a15) padding-box,
                  linear-gradient(135deg, #00ffaa, #0088ff, #8b17b6) border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ringRotate 6s linear infinite;
      margin-bottom: 0.5rem;
    }

    .pair-logo i {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #00ffaa, #0088ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @keyframes ringRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .pair-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #00ffaa 0%, #0088ff 50%, #8b17b6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .pair-subtitle {
      color: rgba(229, 245, 241, 0.45);
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .progress-steps {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 380px;
      padding: 0 1rem;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex: 0 0 auto;
    }

    .step-circle {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(0, 255, 170, 0.2);
      background: rgba(10, 25, 47, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      color: rgba(229, 245, 241, 0.35);
      transition: all 0.4s ease;
    }

    .step.active .step-circle {
      border-color: #00ffaa;
      background: rgba(0, 255, 170, 0.12);
      color: #00ffaa;
      box-shadow: 0 0 12px rgba(0, 255, 170, 0.25);
    }

    .step.done .step-circle {
      border-color: #00ffaa;
      background: #00ffaa;
      color: #050a15;
    }

    .step-label {
      font-size: 0.58rem;
      color: rgba(229, 245, 241, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      transition: color 0.3s;
      white-space: nowrap;
    }

    .step.active .step-label,
    .step.done .step-label { color: #00ffaa; }

    .step-line {
      flex: 1;
      height: 2px;
      background: rgba(0, 255, 170, 0.12);
      margin: 0 4px;
      margin-bottom: 18px;
      transition: background 0.5s ease;
      min-width: 40px;
    }

    .step-line.active {
      background: linear-gradient(90deg, #00ffaa, #0088ff);
    }

    .main-box {
      width: 100%;
      max-width: 460px;
      padding: 2rem 1.8rem;
      background: rgba(10, 25, 47, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 170, 0.18);
      border-radius: 22px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .main-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, #00ffaa, #0088ff, #8b17b6, #00ffaa);
      background-size: 300% 100%;
      animation: gradientSlide 4s linear infinite;
    }

    @keyframes gradientSlide {
      0% { background-position: 0% 0; }
      100% { background-position: 300% 0; }
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.72rem;
      color: rgba(229, 245, 241, 0.45);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-bottom: 0.7rem;
      text-align: left;
    }

    .input-label i { color: #00ffaa; }

    .input-group {
      display: flex;
      gap: 0;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(0, 255, 170, 0.18);
      background: rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .input-group:focus-within {
      border-color: rgba(0, 255, 170, 0.45);
      box-shadow: 0 0 16px rgba(0, 255, 170, 0.08);
    }

    .input-prefix {
      display: flex;
      align-items: center;
      padding: 0 0.8rem;
      background: rgba(0, 255, 170, 0.05);
      border-right: 1px solid rgba(0, 255, 170, 0.1);
      color: #00ffaa;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .input-group input {
      flex: 1;
      padding: 1rem 1rem;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1.5px;
      outline: none;
    }

    .input-group input::placeholder {
      color: rgba(229, 245, 241, 0.22);
      font-family: 'Exo 2', sans-serif;
      letter-spacing: 0.3px;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      margin-top: 0.9rem;
      background: linear-gradient(135deg, #00ffaa, #0088ff);
      border: none;
      border-radius: 12px;
      color: #050a15;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      top: -50%; left: -60%;
      width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: rotate(30deg);
      transition: left 0.5s ease;
    }

    .submit-btn:hover::after { left: 100%; }

    .submit-btn:hover {
      background: linear-gradient(135deg, #0088ff, #8b17b6);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 136, 255, 0.25);
    }

    .submit-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    #waiting-message {
      display: none;
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      background: rgba(0, 136, 255, 0.07);
      border: 1px solid rgba(0, 136, 255, 0.18);
      border-radius: 10px;
      color: rgba(229, 245, 241, 0.75);
      font-size: 0.88rem;
    }

    .waiting-spinner {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .spinner-dots {
      display: flex;
      gap: 4px;
    }

    .spinner-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #0088ff;
      animation: dotBounce 1.4s infinite;
    }

    .spinner-dots span:nth-child(2) { animation-delay: 0.2s; }
    .spinner-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .progress-bar-container {
      width: 100%;
      height: 3px;
      background: rgba(0, 136, 255, 0.1);
      border-radius: 2px;
      margin-top: 0.7rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffaa, #0088ff);
      border-radius: 2px;
      animation: progressAnim 25s ease-out forwards;
    }

    @keyframes progressAnim {
      0% { width: 0%; }
      30% { width: 40%; }
      60% { width: 65%; }
      80% { width: 80%; }
      100% { width: 95%; }
    }

    main#pair {
      margin-top: 1.2rem;
      min-height: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .code-display {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(0, 255, 170, 0.28);
      padding: 1rem 1.8rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      animation: codeAppear 0.4s ease-out;
    }

    @keyframes codeAppear {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .code-display:hover {
      border-color: rgba(0, 255, 170, 0.5);
      box-shadow: 0 0 18px rgba(0, 255, 170, 0.1);
    }

    .code-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .code-value {
      color: #00ffaa;
      text-shadow: 0 0 10px rgba(0, 255, 170, 0.45);
      animation: codeGlow 2s ease-in-out infinite;
      font-size: 1.3rem;
      letter-spacing: 3px;
    }

    @keyframes codeGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(0, 255, 170, 0.45); }
      50% { text-shadow: 0 0 20px rgba(0, 255, 170, 0.75), 0 0 35px rgba(0, 255, 170, 0.25); }
    }

    .error-text {
      color: #ff6b6b;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .copy-hint {
      font-size: 0.68rem;
      color: rgba(229, 245, 241, 0.28);
      margin-top: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .success-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: rgba(0, 255, 170, 0.08);
      border: 1px solid rgba(0, 255, 170, 0.28);
      border-radius: 50px;
      font-size: 0.68rem;
      color: #00ffaa;
      letter-spacing: 1px;
      margin-top: 0.6rem;
      animation: badgePop 0.4s ease-out;
    }

    @keyframes badgePop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .hint-row {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 460px;
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0.5rem 0.9rem;
      background: rgba(10, 25, 47, 0.5);
      border: 1px solid rgba(0, 255, 170, 0.08);
      border-radius: 8px;
      font-size: 0.73rem;
      color: rgba(229, 245, 241, 0.45);
    }

    .hint-item i {
      color: #00ffaa;
      font-size: 0.7rem;
    }

    .footer {
      text-align: center;
      padding: 1rem;
      width: 100%;
      max-width: 460px;
      border-top: 1px solid rgba(0, 255, 170, 0.07);
      color: rgba(229, 245, 241, 0.28);
      font-size: 0.78rem;
    }

    .footer a {
      color: #00ffaa;
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer a:hover { color: #0088ff; }

    @media (max-width: 600px) {
      .pair-title { font-size: 1.2rem; letter-spacing: 3px; }
      .main-box { padding: 1.6rem 1.2rem; }
      .back-btn { top: 10px; left: 10px; padding: 7px 13px; font-size: 0.75rem; }
      .code-value { font-size: 1.1rem; letter-spacing: 2px; }
      .hint-row { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  <div class="glowing-bg">
    <div class="glow-circle"></div>
    <div class="glow-circle"></div>
  </div>
  <div class="scan-lines"></div>
  <canvas class="particle-canvas" id="particles"></canvas>

  <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> BACK</a>

  <div class="page-wrapper">
    <div class="pair-header">
      <h1 class="pair-title">PAIR CODE</h1>
      <p class="pair-subtitle">Generate your WhatsApp session code</p>
    </div>

    <div class="main-box" id="box">
      <div id="text">
        <div class="input-label">
          <i class="fas fa-phone-alt"></i>
          <span>WhatsApp Number with Country Code</span>
        </div>

        <div class="input-group">
          <div class="input-prefix">+</div>
          <input placeholder="e.g. 254792021944" type="number" id="number" name="">
        </div>

        <button class="submit-btn" id="submit">
          <i class="fas fa-bolt"></i> &nbsp; GENERATE PAIR CODE
        </button>

        <div id="waiting-message">
          <div class="waiting-spinner">
            <div class="spinner-dots">
              <span></span><span></span><span></span>
            </div>
            <span>Connecting to WhatsApp servers...</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <main id="pair"></main>
      </div>
    </div>

    <div class="hint-row">
      <div class="hint-item"><i class="fas fa-info-circle"></i> Include country code, no + sign</div>
      <div class="hint-item"><i class="fas fa-clock"></i> Code expires in 60 seconds</div>
      <div class="hint-item"><i class="fas fa-mobile-alt"></i> WhatsApp &rsaquo; Linked Devices &rsaquo; Link</div>
    </div>

    <footer class="footer">
      <p>&copy; 2025 <a href="https://github.com/smiletech12/Maya-xmd" target="_blank">MAYA-XMD</a> | Secure Session Pairing</p>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particlesArr = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.opacity = Math.random() * 0.4 + 0.1;
        this.color = ['rgba(0,255,170,', 'rgba(0,136,255,', 'rgba(139,23,182,'][Math.floor(Math.random() * 3)];
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color + this.opacity + ')';
        ctx.fill();
      }
    }

    for (let i = 0; i < 50; i++) particlesArr.push(new Particle());

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particlesArr.forEach(p => { p.update(); p.draw(); });
      for (let i = 0; i < particlesArr.length; i++) {
        for (let j = i + 1; j < particlesArr.length; j++) {
          const dx = particlesArr[i].x - particlesArr[j].x;
          const dy = particlesArr[i].y - particlesArr[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(particlesArr[i].x, particlesArr[i].y);
            ctx.lineTo(particlesArr[j].x, particlesArr[j].y);
            ctx.strokeStyle = 'rgba(0, 255, 170, ' + (0.06 * (1 - dist / 100)) + ')';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animateParticles);
    }

    animateParticles();

    const a = document.getElementById("pair");
    const b = document.getElementById("submit");
    const c = document.getElementById("number");
    const waitingMessage = document.getElementById("waiting-message");

    async function Copy() {
      const text = document.getElementById("copy").innerText;
      const obj = document.getElementById("copy");
      try {
        await navigator.clipboard.writeText(text.replace('CODE: ', '').trim());
        obj.innerHTML = '<span class="code-text" style="color:#00ffaa;"><i class="fas fa-check"></i> COPIED!</span>';
        setTimeout(() => {
          obj.innerHTML = '<span class="code-text">CODE: <span class="code-value">' + text.replace('CODE: ', '').trim() + '</span></span>';
        }, 1500);
      } catch(e) {}
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<div class="code-display"><span class="error-text"><i class="fas fa-exclamation-triangle"></i> Enter your number with country code</span></div>';
        return;
      }
      if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<div class="code-display"><span class="error-text"><i class="fas fa-exclamation-triangle"></i> Invalid number format</span></div>';
        return;
      }

      const Nick = c.value.replace(/[^0-9]/g, "");
      let bb = "";
      let bbc = "";
      const cc = Nick.split('');
      cc.map(ch => {
        bbc += ch;
        if (bbc.length == 3) { bb += " " + ch; }
        else if (bbc.length == 8) { bb += " " + ch; }
        else { bb += ch; }
      });
      c.type = "text";
      c.value = "+" + bb;
      c.style.color = "#00ffaa";

      b.disabled = true;
      b.innerHTML = '<i class="fas fa-spinner fa-spin"></i> &nbsp; GENERATING...';
      a.innerHTML = '';
      waitingMessage.style.display = "block";
      document.getElementById('progressBar').style.animation = 'none';
      void document.getElementById('progressBar').offsetHeight;
      document.getElementById('progressBar').style.animation = 'progressAnim 25s ease-out forwards';

      try {
        let { data } = await axios('/code?number=' + Nick);
        let code = data.code || "Service Unavailable";
        a.innerHTML = '<div class="code-display" id="copy" onclick="Copy()"><span class="code-text">CODE: <span class="code-value">' + code + '</span></span></div><p class="copy-hint"><i class="fas fa-copy"></i> Click to copy</p><div class="success-badge"><i class="fas fa-check-circle"></i> Code Generated Successfully</div>';
      } catch (error) {
        a.innerHTML = '<div class="code-display"><span class="error-text"><i class="fas fa-exclamation-triangle"></i> Service Unavailable — Try Again</span></div>';
      } finally {
        waitingMessage.style.display = "none";
        b.disabled = false;
        b.innerHTML = '<i class="fas fa-bolt"></i> &nbsp; GENERATE PAIR CODE';
      }
    });
  </script>
</body>
</html>
